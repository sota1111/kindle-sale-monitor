<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - Kindle Sale Monitor</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 1.5rem;
           background: #f4f6f9; color: #1c2430; -webkit-font-smoothing: antialiased;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border: 1px solid #e6e9ee; border-radius: 16px; padding: 2rem; width: 100%;
            max-width: 380px; box-shadow: 0 12px 32px rgba(16,24,40,.12); }
    .brand { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.5rem; }
    .brand-mark { display: inline-flex; align-items: center; justify-content: center;
                  width: 44px; height: 44px; border-radius: 12px; margin-bottom: .75rem; font-size: 1.3rem;
                  background: linear-gradient(135deg, #2563eb, #f59e0b); }
    h1 { margin: 0; font-size: 1.3rem; text-align: center; letter-spacing: -.01em; }
    .brand p { margin: .35rem 0 0; color: #5b6472; font-size: .88rem; }
    label { display: block; margin-bottom: 0.3rem; font-size: 0.88rem; color: #1c2430; font-weight: 500; }
    input { width: 100%; box-sizing: border-box; padding: 0.6rem 0.8rem;
            border: 1px solid #d4d8df; border-radius: 8px; margin-bottom: 1rem; font-size: 1rem; }
    input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px #e8f0fe; }
    button { width: 100%; padding: 0.7rem; background: #2563eb; color: white;
             border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .15s; }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #b91c1c; font-size: 0.88rem; margin-bottom: 1rem;
             background: #fdecec; border: 1px solid #f6c5c5; padding: 0.55rem .7rem; border-radius: 8px; }
    .lang-toggle { display: inline-flex; align-items: center; margin: 0 0 1rem auto;
                   border: 1px solid #d4d8df; border-radius: 7px; overflow: hidden; }
    .lang-toggle button { width: auto; background: transparent; color: #5b6472; border: none;
                          cursor: pointer; font-family: inherit; font-size: .78rem; font-weight: 600;
                          padding: .25rem .55rem; border-radius: 0; }
    .lang-toggle button + button { border-left: 1px solid #d4d8df; }
    .lang-toggle button.active { background: #2563eb; color: #fff; }
    .lang-toggle-row { display: flex; }
  </style>
</head>
<body>
  <div class="card">
    <div class="lang-toggle-row">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button type="button" data-lang-btn="ja">JP</button>
        <button type="button" data-lang-btn="en">EN</button>
      </div>
    </div>
    <div class="brand">
      <span class="brand-mark">📚</span>
      <h1>Kindle Sale Monitor</h1>
      <p>ログインして監視を続ける</p>
    </div>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/login">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required autofocus placeholder="your-email@example.com">
      
      <label for="password">パスワード</label>
      <input type="password" id="password" name="password" required placeholder="パスワードを入力">
      
      <button type="submit">ログイン</button>
    </form>
  </div>

  <!-- Lightweight client-side JP/EN i18n for the login page (SOT-953). -->
  <script>
  (function () {
      var STORAGE_KEY = "ksm.lang";
      var DICT = {
          "ログインして監視を続ける": "Sign in to continue monitoring",
          "メールアドレス": "Email",
          "パスワード": "Password",
          "ログイン": "Sign in",
          "パスワードを入力": "Enter your password"
      };
      var textCache = [], attrCache = [], lang = "ja";
      function readLang() {
          try { return localStorage.getItem(STORAGE_KEY) === "en" ? "en" : "ja"; }
          catch (e) { return "ja"; }
      }
      function collect() {
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
              acceptNode: function (n) {
                  if (!n.nodeValue) return NodeFilter.FILTER_REJECT;
                  var p = n.parentNode;
                  if (p && (p.nodeName === "SCRIPT" || p.nodeName === "STYLE")) return NodeFilter.FILTER_REJECT;
                  var t = n.nodeValue.trim();
                  return (t && Object.prototype.hasOwnProperty.call(DICT, t))
                      ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
              }
          });
          var n;
          while ((n = walker.nextNode())) {
              var raw = n.nodeValue, ja = raw.trim(), i = raw.indexOf(ja);
              textCache.push({ node: n, ja: ja, lead: raw.slice(0, i), trail: raw.slice(i + ja.length) });
          }
          var phs = document.querySelectorAll("[placeholder]");
          for (var k = 0; k < phs.length; k++) {
              var pj = (phs[k].getAttribute("placeholder") || "").trim();
              if (Object.prototype.hasOwnProperty.call(DICT, pj)) attrCache.push({ el: phs[k], ja: pj });
          }
      }
      function apply() {
          var en = lang === "en";
          textCache.forEach(function (c) {
              c.node.nodeValue = c.lead + (en && DICT[c.ja] ? DICT[c.ja] : c.ja) + c.trail;
          });
          attrCache.forEach(function (a) {
              a.el.setAttribute("placeholder", en && DICT[a.ja] ? DICT[a.ja] : a.ja);
          });
          document.documentElement.lang = lang;
          var btns = document.querySelectorAll("[data-lang-btn]");
          for (var i = 0; i < btns.length; i++) {
              btns[i].classList.toggle("active", btns[i].getAttribute("data-lang-btn") === lang);
          }
          try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
      }
      function init() {
          lang = readLang();
          collect();
          apply();
          var btns = document.querySelectorAll("[data-lang-btn]");
          for (var i = 0; i < btns.length; i++) {
              (function (b) {
                  b.addEventListener("click", function () {
                      lang = b.getAttribute("data-lang-btn") === "en" ? "en" : "ja"; apply();
                  });
              })(btns[i]);
          }
      }
      if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
      else init();
  })();
  </script>
</body>
</html>
