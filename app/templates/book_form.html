{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="card">
    <h1>{{ title }}</h1>
    <form method="post">
        <div class="field-grid">
            <div class="field-group field-group-full">
                <label class="field-label" for="f-title">作品名 *</label>
                <input class="field" id="f-title" type="text" name="title" value="{{ book.title if book else '' }}" required>
            </div>
            <div class="field-group">
                <label class="field-label" for="f-author">作者名</label>
                <input class="field" id="f-author" type="text" name="author" value="{{ book.author or '' if book else '' }}">
            </div>
            <div class="field-group">
                <label class="field-label" for="f-publisher">出版社</label>
                <input class="field" id="f-publisher" type="text" name="publisher" value="{{ book.publisher or '' if book else '' }}">
            </div>
            <div class="field-group">
                <label class="field-label" for="f-amazon">Amazon URL</label>
                <input class="field" id="f-amazon" type="url" name="amazon_url" value="{{ book.amazon_url or '' if book else '' }}">
            </div>
            <div class="field-group">
                <label class="field-label" for="f-asin">ASIN</label>
                <input class="field" id="f-asin" type="text" name="asin" value="{{ book.asin or '' if book else '' }}">
            </div>
            <div class="field-group field-group-full">
                <label class="field-label" for="f-salebon">sale-bon URL</label>
                <input class="field" id="f-salebon" type="url" name="sale_bon_url" value="{{ book.sale_bon_url or '' if book else '' }}">
            </div>
            <div class="field-group field-group-full">
                <label class="field-label" for="f-note">メモ</label>
                <textarea class="field" id="f-note" name="note">{{ book.note or '' if book else '' }}</textarea>
            </div>
        </div>
        <div class="toggle-row">
            <label class="toggle"><input type="checkbox" name="series_watch" value="true" {% if book and book.series_watch %}checked{% endif %}><span>シリーズ監視</span></label>
            {% if book %}
            <label class="toggle"><input type="checkbox" name="enabled" value="true" {% if book.enabled %}checked{% endif %}><span>有効</span></label>
            {% endif %}
        </div>
        <div style="margin-top:1rem">
            <button type="submit" class="btn">保存</button>
            <a href="/books" class="btn btn-secondary">キャンセル</a>
        </div>
    </form>
</div>
{% if book %}
<div class="card">
    <h2>この本を削除</h2>
    <form method="post" action="/books/{{ book.id }}/delete" onsubmit="return confirm('削除しますか？')">
        <button type="submit" class="btn btn-danger">削除</button>
    </form>
</div>
{% endif %}
{% endblock %}
