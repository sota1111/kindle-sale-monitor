{% extends "base.html" %}
{% block title %}設定{% endblock %}
{% block content %}
<div class="card">
    <h1>設定</h1>
    <form method="post" action="/settings">
        <div class="field-grid">
        {% for s in settings %}
            <div class="field-group">
                <label class="field-label" for="set-{{ loop.index }}">{{ s.key }}</label>
                <input class="field" id="set-{{ loop.index }}" type="text" name="{{ s.key }}" value="{{ s.value }}">
                <span class="field-hint">{{ s.updated_at }}</span>
            </div>
        {% else %}
            <p>設定なし</p>
        {% endfor %}
        </div>
        <div style="margin-top:1rem">
            <button type="submit" class="btn">設定を保存</button>
        </div>
    </form>
</div>
{% endblock %}
